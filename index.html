<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATIVUX - Netflix Style Premium</title>
    <style>
        :root { --main-red: #e50914; --bg-black: #141414; }
        
        body { 
            margin: 0; background: var(--bg-black); color: white; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
        }

        /* REPRODUCTOR PRINCIPAL */
        .hero-player {
            position: relative; width: 100%; height: 75vh;
            background: #000; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: contain; }

        /* INTERFAZ SOBRE EL VIDEO (AUTO-HIDE) */
        .ui-element {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .logo {
            position: absolute; top: 20px; left: 40px;
            font-weight: bold; font-size: 30px; color: var(--main-red);
            z-index: 10; letter-spacing: 1px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        .video-info {
            position: absolute; bottom: 60px; left: 40px;
            z-index: 10; max-width: 50%;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        .video-info h1 { font-size: 36px; margin: 0; }
        .video-info p { font-size: 16px; color: #ccc; margin-bottom: 20px; }

        /* BOTONES DE CONTROL */
        .control-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

        .btn-control {
            background: white; color: black; border: none; padding: 10px 20px;
            font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; transition: background 0.2s;
        }
        .btn-control:hover { background: rgba(255,255,255,0.7); }
        .btn-secondary { background: rgba(109, 109, 110, 0.7); color: white; }
        .btn-secondary:hover { background: rgba(109, 109, 110, 0.4); }

        /* Estilo para el botón de favorito */
        .btn-fav { color: #ccc; }
        .btn-fav.active { color: #ffeb3b; }

        /* SECCIÓN DE CATÁLOGO */
        .content-section { padding: 40px; }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #e5e5e5; }
        
        .row {
            display: flex; gap: 15px; overflow-x: auto; padding: 15px 0;
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .row::-webkit-scrollbar { display: none; }

        .card {
            min-width: 280px; height: 160px; background: #2f2f2f;
            border-radius: 4px; cursor: pointer; transition: transform 0.3s;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; position: relative; overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .card:hover { transform: scale(1.08); z-index: 5; border: 2px solid white; }
        
        .card video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            z-index: 1; opacity: 0.6;
        }
        
        .card-info {
            position: relative; z-index: 2; 
            background: rgba(0,0,0,0.7); padding: 8px; 
            border-radius: 4px; width: 80%; text-align: center;
        }

        .fav-indicator { position: absolute; top: 10px; right: 10px; color: #ffeb3b; z-index: 3; font-size: 20px; }

        /* FLECHAS DE DESPLAZAMIENTO DEL CATÁLOGO */
        .catalog-wrapper { position: relative; }
        .scroll-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 20; background: rgba(0,0,0,0.75); color: white;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
            width: 44px; height: 44px; font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }
        .scroll-btn:hover { background: var(--main-red); border-color: var(--main-red); }
        .scroll-btn.left  { left: -18px; }
        .scroll-btn.right { right: -18px; }
        .search-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 0 40px 0 40px; margin-bottom: -10px; margin-top: 20px;
        }
        .search-bar input {
            background: rgba(40,40,40,0.95); border: 1px solid #555; color: white;
            padding: 10px 16px; font-size: 15px; border-radius: 4px; width: 320px;
            outline: none; transition: border 0.2s;
        }
        .search-bar input:focus { border-color: var(--main-red); }
        .search-bar input::placeholder { color: #888; }
        .btn-search {
            background: var(--main-red); color: white; border: none;
            padding: 10px 18px; font-size: 15px; border-radius: 4px;
            cursor: pointer; font-weight: bold; transition: background 0.2s;
        }
        .btn-search:hover { background: #b00710; }
        .search-results-count { color: #aaa; font-size: 13px; }
        .no-results { color: #888; font-size: 15px; padding: 20px 0; }

        /* Tarjeta: sin video, thumbnail de color */
        .card-thumb {
            position: absolute; top:0; left:0; width:100%; height:100%;
            object-fit: cover; z-index:1; opacity:0.7;
        }
        .card-placeholder {
            position:absolute; top:0; left:0; width:100%; height:100%;
            z-index:1; display:flex; align-items:center; justify-content:center;
            font-size: 38px; opacity: 0.18;
        }

        .vignette {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(transparent, rgba(20,20,20,1));
            z-index: 5; pointer-events: none;
        }
    </style>

        ];

        // ── SCROLL MANUAL DEL CATÁLOGO ────────────────────────────────────────
        function scrollCatalog(dir) {
            catalogRow.scrollBy({ left: dir * 600, behavior: 'smooth' });
        }

        // ── 1. CATÁLOGO (sin videos en tarjetas = carga ultrarrápida) ──────────
        function renderCatalog(lista) {
            catalogRow.innerHTML = "";
            const listaOrdenada = [...lista].sort((a, b) => {
                const aFav = favoritos.includes(a.id);
                const bFav = favoritos.includes(b.id);
                return (aFav === bFav) ? 0 : aFav ? -1 : 1;
            });

            if (listaOrdenada.length === 0) {
                noResults.style.display = "block";
                searchCount.textContent = "0 resultados";
                return;
            }
            noResults.style.display = "none";

            const fragment = document.createDocumentFragment();
            listaOrdenada.forEach((video) => {
                const card = document.createElement('div');
                card.className = "card";
                const isFav = favoritos.includes(video.id);
                const bgColor = CATEGORY_COLORS[video.desc] || '#2f2f2f';
                const icon = CATEGORY_ICONS[video.desc] || '▶';

                card.style.background = bgColor;
                card.onclick = () => {
                    const realIndex = listaVideos.findIndex(v => v.id === video.id);
                    seleccionarVideo(realIndex, 0);
                };
                card.innerHTML = `
                    <div class="card-placeholder">${icon}</div>
                    ${isFav ? '<div class="fav-indicator">★</div>' : ''}
                    <div class="card-info">
                        <div style="font-size:11px;color:#aaa;margin-bottom:3px;">${video.desc}</div>
                        ${video.nombre}
                    </div>
                `;
                fragment.appendChild(card);
            });
            catalogRow.appendChild(fragment);
        }

        // ── 2. BUSCADOR ───────────────────────────────────────────────────────
        function buscarVideos() {
            const q = searchInput.value.trim().toLowerCase();
            if (!q) {
                listaFiltrada = listaVideos;
                sectionTitle.textContent = "Tu Programación";
                searchCount.textContent = "";
            } else {
                listaFiltrada = listaVideos.filter(v =>
                    v.nombre.toLowerCase().includes(q) || v.desc.toLowerCase().includes(q)
                );
                sectionTitle.textContent = `Resultados para: "${searchInput.value.trim()}"`;
                searchCount.textContent = `${listaFiltrada.length} resultado${listaFiltrada.length !== 1 ? 's' : ''}`;
            }
            renderCatalog(listaFiltrada);
        }

        // ── 3. REPRODUCCIÓN ───────────────────────────────────────────────────
        function seleccionarVideo(index, resumeTime = 0) {
            indiceActual = index;
            const video = listaVideos[index];
            player.src = video.url;
            heroTitle.textContent = video.nombre;
            document.getElementById('heroDesc').textContent = video.desc;
            player.load();
            player.onloadedmetadata = () => {
                if (resumeTime > 0) player.currentTime = resumeTime;
                player.play().catch(() => {});
                actualizarInterfaz();
            };
            localStorage.setItem('nativux_index', index);
        }

        // ── 4. SKIP ±10s ──────────────────────────────────────────────────────
        function skipTime(seconds) {
            player.currentTime = Math.max(0, Math.min(player.duration || 0, player.currentTime + seconds));
        }

        // ── 5. FAVORITOS ──────────────────────────────────────────────────────
        function toggleFavorite() {
            const videoId = listaVideos[indiceActual].id;
            if (favoritos.includes(videoId)) {
                favoritos = favoritos.filter(id => id !== videoId);
            } else {
                favoritos.push(videoId);
            }
            localStorage.setItem('nativux_favs', JSON.stringify(favoritos));
            actualizarInterfaz();
            renderCatalog(listaFiltrada);
        }

        function actualizarInterfaz() {
            const isFav = favoritos.includes(listaVideos[indiceActual].id);
            btnFav.innerHTML = isFav ? "★ EN FAVORITOS" : "☆ FAVORITO";
            btnFav.classList.toggle('active', isFav);
            btnPlayPause.innerHTML = player.paused ? "▶ REPRODUCIR" : "⏸ PAUSAR";
            btnMute.innerHTML = player.muted ? "🔇 ACTIVAR" : "🔊 SILENCIAR";
        }

        // ── 6. AUTO-HIDE CONTROLES ────────────────────────────────────────────
        function resetUITimer() {
            uiElements.forEach(el => el.style.opacity = "1");
            clearTimeout(uiTimer);
            if (!player.paused) {
                uiTimer = setTimeout(() => {
                    uiElements.forEach(el => el.style.opacity = "0");
                }, 3000);
            }
        }

        // ── 7. CONTROLES BÁSICOS ──────────────────────────────────────────────
        function togglePlayPause() { player.paused ? player.play() : player.pause(); actualizarInterfaz(); }
        function toggleMute() { player.muted = !player.muted; actualizarInterfaz(); }
        function toggleFullScreen() {
            const c = document.getElementById('mainContainer');
            if (!document.fullscreenElement) c.requestFullscreen();
            else document.exitFullscreen();
        }

        player.onpause = actualizarInterfaz;
        player.onplay = actualizarInterfaz;

        // Guardar posición con debounce (cada 3s) para no saturar localStorage
        player.ontimeupdate = () => {
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                localStorage.setItem('nativux_time', player.currentTime);
            }, 3000);
        };

        // ── 8. AUTO-SCROLL (requestAnimationFrame, más eficiente) ─────────────
        let scrollDir = 1;
        let lastScroll = 0;
        function autoScroll(ts) {
            if (ts - lastScroll > 30) {
                if (!catalogRow.matches(':hover')) {
                    catalogRow.scrollLeft += scrollDir;
                    if (catalogRow.scrollLeft + catalogRow.clientWidth >= catalogRow.scrollWidth || catalogRow.scrollLeft <= 0)
                        scrollDir *= -1;
                }
                lastScroll = ts;
            }
            requestAnimationFrame(autoScroll);
        }

        // ── INICIO ────────────────────────────────────────────────────────────
        listaFiltrada = listaVideos;
        renderCatalog(listaFiltrada);
        seleccionarVideo(indiceActual, tiempoGuardado);
        requestAnimationFrame(autoScroll);
    </script>
